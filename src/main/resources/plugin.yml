name: ConfigurableCrafts
version: 0.1.0
main: com.bountysmp.configurablecrafts.ConfigurableCraftsPlugin
api-version: '1.21.11'
author: BountySMP
description: Highly configurable in-game crafting recipes.
commands:
  configurablecrafts:
    description: Open the ConfigurableCrafts menu.
    usage: /configurablecrafts [all|custom|disabled]
    aliases: [cc]
    permission: configurablecrafts.view
permissions:
  configurablecrafts.view:
    description: Open the read-only ConfigurableCrafts recipe catalog.
    default: true
  configurablecrafts.admin:
    description: Create, edit, delete, and revert configurable recipes.
    default: op
    children:
      configurablecrafts.view: true
